name: 股票选股推送

on:
  schedule:
    # 每天 10:30、13:00、14:30 执行（UTC时间，需要根据时区调整）
   - cron: '0 2 * * 1-5'   # 10:00 (UTC+8)
    - cron: '0 3 * * 1-5'   # 11:00 (UTC+8)
    - cron: '0 5 * * 1-5'   # 13:00 (UTC+8)
  workflow_dispatch:  # 手动触发

jobs:
  run-stock-selection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 安装 Node.js 依赖
        run: npm install
        
      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install pywencai pandas requests
          
      - name: 运行选股脚本
        run: |
          echo "Starting stock selection script..."
          echo "FEISHU_WEBHOOK set: ${{ secrets.FEISHU_WEBHOOK != '' }}"
          echo "WENCAI_COOKIE set: ${{ secrets.WENCAI_COOKIE != '' }}"
          node wencai_example.js
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WENCAI_COOKIE: ${{ secrets.WENCAI_COOKIE }}
